<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frame It — Authorizing</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #1a1a1f;
      --surface: #25252d;
      --border:  #3a3a47;
      --accent:  #7c6bff;
      --success: #3ecf8e;
      --danger:  #ff5a5f;
      --text:    #e8e8ef;
      --sub:     #8888a0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 380px; width: 100%;
      text-align: center;
    }
    .icon {
      font-size: 48px; margin-bottom: 20px;
      display: block; line-height: 1;
    }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 13px; color: var(--sub); line-height: 1.6; margin-bottom: 20px; }

    /* Spinner (while processing) */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Fallback code display */
    .code-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 12px;
      word-break: break-all;
      color: var(--accent);
      margin-bottom: 12px;
      text-align: left;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px;
      padding: 10px 20px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .btn:hover { background: #6a59e8; }
    .btn-secondary {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-row { display: flex; gap: 8px; justify-content: center; }

    .status--success .accent { color: var(--success); }
    .status--error   .accent { color: var(--danger); }
  </style>
</head>
<body>
<div class="card" id="card">
  <!-- Populated by JS -->
  <div class="spinner"></div>
  <h1>Authorizing…</h1>
  <p>Completing sign-in with Frame.io.</p>
</div>

<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code   = params.get('code');
  var state  = params.get('state');
  var error  = params.get('error');
  var errDesc = params.get('error_description');
  var card   = document.getElementById('card');

  function render(html) { card.innerHTML = html; }

  // ── Error from Frame.io ───────────────────────────────────────────────────
  if (error) {
    render(
      '<span class="icon">❌</span>' +
      '<h1>Authorization denied</h1>' +
      '<p>' + escHtml(errDesc || error) + '</p>' +
      '<p style="margin-top:8px;">You can close this window and try again in the plugin.</p>'
    );
    return;
  }

  // ── No code at all (page visited directly) ────────────────────────────────
  if (!code) {
    render(
      '<span class="icon">🔐</span>' +
      '<h1>Frame It OAuth</h1>' +
      '<p>This page is the OAuth callback for the Frame It Figma plugin.<br>' +
      'Open the plugin in Figma and click <strong>Sign in with Frame.io</strong> to start.</p>'
    );
    return;
  }

  // ── Happy path: send to plugin via window.opener ──────────────────────────
  if (window.opener) {
    try {
      window.opener.postMessage(
        { type: 'frame-it-oauth', code: code, state: state },
        '*'
      );
      render(
        '<span class="icon">✅</span>' +
        '<h1>Signed in!</h1>' +
        '<p>You\'ve authorized Frame It. This window will close automatically.</p>'
      );
      setTimeout(function () { window.close(); }, 1800);
      return;
    } catch (e) {
      // Fall through to manual-copy fallback
    }
  }

  // ── Fallback: window.opener unavailable (popup blocker edge case) ─────────
  render(
    '<span class="icon">🔑</span>' +
    '<h1>One more step</h1>' +
    '<p>The plugin window could not be reached automatically.<br>' +
    'Copy the code below and paste it into the plugin.</p>' +
    '<div class="code-box" id="code-display">' + escHtml(code) + '</div>' +
    '<div class="btn-row">' +
    '  <button class="btn" id="copy-btn">📋 Copy code</button>' +
    '</div>'
  );

  document.getElementById('copy-btn').addEventListener('click', function () {
    navigator.clipboard.writeText(code).then(function () {
      document.getElementById('copy-btn').textContent = '✓ Copied!';
    });
  });

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
})();
</script>
</body>
</html>
